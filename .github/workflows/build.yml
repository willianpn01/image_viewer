name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [ created ]

jobs:
  build-linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential \
            qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
            libqt6svg6-dev libgl1-mesa-dev \
            libx11-dev

      - name: Baixar ONNX Runtime
        run: |
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.17.1/onnxruntime-linux-x64-1.17.1.tgz
          tar -xzf onnxruntime-linux-x64-1.17.1.tgz
          mv onnxruntime-linux-x64-1.17.1 third_party/onnxruntime

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Empacotar
        run: |
          mkdir -p dist-linux
          cp build/CImgViewer dist-linux/
          cp -r build/translations dist-linux/ 2>/dev/null || true
          tar -czf CImgViewer-linux-x64.tar.gz -C dist-linux .

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: CImgViewer-linux-x64
          path: CImgViewer-linux-x64.tar.gz

  build-windows:
    name: Windows (Cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake mingw-w64 wine64 \
            qt6-base-dev qt6-tools-dev qt6-tools-dev-tools

      - name: Instalar Qt6 para Windows
        run: |
          pipx install aqtinstall
          aqt install-qt windows desktop 6.7.3 win64_mingw \
            -O ~/qt6-windows
          aqt install-qt windows desktop 6.7.3 win64_mingw \
            -O ~/qt6-windows --modules qtimageformats

      - name: Baixar ONNX Runtime Windows
        run: |
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.17.1/onnxruntime-win-x64-1.17.1.zip
          unzip -q onnxruntime-win-x64-1.17.1.zip

      - name: Configurar wrappers wine para ferramentas Qt
        run: |
          chmod +x ~/qt6-windows/6.7.3/mingw_64/bin/*.exe
          for exe in moc rcc uic; do
            mv ~/qt6-windows/6.7.3/mingw_64/bin/${exe}.exe \
               ~/qt6-windows/6.7.3/mingw_64/bin/${exe}.exe.bak
            echo '#!/bin/bash' > ~/qt6-windows/6.7.3/mingw_64/bin/${exe}.exe
            echo "wine ~/qt6-windows/6.7.3/mingw_64/bin/${exe}.exe.bak \"\$@\"" \
               >> ~/qt6-windows/6.7.3/mingw_64/bin/${exe}.exe
            chmod +x ~/qt6-windows/6.7.3/mingw_64/bin/${exe}.exe
          done

      - name: Build Windows
        run: |
          mkdir -p cmake
          cat > cmake/Toolchain-mingw64.cmake << 'TOOLCHAIN'
          set(CMAKE_SYSTEM_NAME Windows)
          set(CMAKE_SYSTEM_PROCESSOR x86_64)
          set(CMAKE_C_COMPILER x86_64-w64-mingw32-gcc)
          set(CMAKE_CXX_COMPILER x86_64-w64-mingw32-g++)
          set(CMAKE_RC_COMPILER x86_64-w64-mingw32-windres)
          set(CMAKE_FIND_ROOT_PATH /usr/x86_64-w64-mingw32 $ENV{HOME}/qt6-windows/6.7.3/mingw_64)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          TOOLCHAIN

          cmake -B build-windows \
            -DCMAKE_TOOLCHAIN_FILE=cmake/Toolchain-mingw64.cmake \
            -DCMAKE_PREFIX_PATH=$HOME/qt6-windows/6.7.3/mingw_64 \
            -DQT_HOST_PATH=/usr \
            -DQT_HOST_PATH_CMAKE_DIR=/usr/lib/x86_64-linux-gnu/cmake \
            -DONNXRUNTIME_DIR=$PWD/onnxruntime-win-x64-1.17.1 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-windows -j$(nproc)

      - name: Empacotar Windows
        run: |
          mkdir -p dist-windows/{imageformats,platforms,styles,tls,translations,models}
          cp build-windows/CImgViewer.exe dist-windows/
          cp onnxruntime-win-x64-1.17.1/lib/onnxruntime*.dll dist-windows/
          cp ~/qt6-windows/6.7.3/mingw_64/bin/Qt6{Core,Gui,Widgets,Network,Svg,SvgWidgets,OpenGL,OpenGLWidgets,Xml,DBus}.dll dist-windows/
          cp /usr/lib/gcc/x86_64-w64-mingw32/13-win32/libstdc++-6.dll dist-windows/ 2>/dev/null || \
             find /usr -name "libstdc++-6.dll" -exec cp {} dist-windows/ \;
          cp /usr/x86_64-w64-mingw32/lib/libwinpthread-1.dll dist-windows/ 2>/dev/null || true
          find /usr -name "libgcc_s_seh-1.dll" -exec cp {} dist-windows/ \; 2>/dev/null || true
          cp ~/qt6-windows/6.7.3/mingw_64/plugins/imageformats/*.dll dist-windows/imageformats/
          cp ~/qt6-windows/6.7.3/mingw_64/plugins/platforms/qwindows.dll dist-windows/platforms/
          cp ~/qt6-windows/6.7.3/mingw_64/plugins/tls/*.dll dist-windows/tls/
          cp ~/qt6-windows/6.7.3/mingw_64/plugins/styles/*.dll dist-windows/styles/ 2>/dev/null || true
          cp -r build-windows/translations dist-windows/ 2>/dev/null || true
          zip -r CImgViewer-windows-x64.zip dist-windows/

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: CImgViewer-windows-x64
          path: CImgViewer-windows-x64.zip

  release:
    name: Publicar Release
    needs: [ build-linux, build-windows ]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/download-artifact@v4

      - name: Publicar no Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CImgViewer-linux-x64/CImgViewer-linux-x64.tar.gz
            CImgViewer-windows-x64/CImgViewer-windows-x64.zip
